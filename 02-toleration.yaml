kind: Pod
apiVersion: v1
metadata:
  name: toleration
  labels:
    purpose: "toleration-demo"
spec:
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1c
  containers:
  - name: nginx
    image: nginx
  tolerations:
  - key: "env"
    operator: "Equal"
    value: "prod"
    effect: "NoExecute"